{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <h2>Admin Login</h2>
    <form method="post" action="/login" class="stack">
        <label>
            Username
            <input type="text" name="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Sign in</button>
    </form>
</section>
{% endblock %}
