[supervisord]
nodaemon=true
logfile=/var/log/wormhole/ocserv/supervisord.log
pidfile=/var/run/supervisord.pid

[program:ocserv]
command=/usr/local/sbin/ocserv -f -c /etc/ocserv/ocserv.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/wormhole/ocserv/ocserv.log
stdout_logfile_maxbytes=0
stderr_logfile=/var/log/wormhole/ocserv/error.log
stderr_logfile_maxbytes=0
